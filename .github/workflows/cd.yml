name: cd

on:
  push:
    branches: [main]

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: gcloud info (sanity check)
        run: gcloud info
      - name: Build & push Docker image (Cloud Build)
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-489217/notely-ar-repo/notely:v1 .
      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-489217/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-489217 --max-instances=4
