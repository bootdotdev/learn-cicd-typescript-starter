name: CD

on:
  push:
    branches: [main]

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      # Authenticate to Google Cloud
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # Install gcloud CLI
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: digital-well-489409-n4

      # Allow docker to push to Artifact Registry
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # Build and push Docker image
      - name: Build and Push Image
        run: |
          gcloud builds submit \
          --tag us-central1-docker.pkg.dev/digital-well-489409-n4/notely-ar-repo/notely:v1 .
      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
            --image us-central1-docker.pkg.dev/digital-well-489409-n4/notely-ar-repo/notely:v1 \
            --region us-central1 \
            --allow-unauthenticated \
            --project digital-well-489409-n4 \
            --max-instances=4
