name: ci

on:
  pull_request:
    branches: [main]

jobs:

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install dependencies
        run: npm install -D vitest

      - name: Install dependencies
        run: npm i -D @vitest/coverage-v8

      - name: Run unit test
        run: npm run test --coverage        

  style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Check formating
        run:  npm run format:check

      - name: Check lint
        run:  npm run lint
