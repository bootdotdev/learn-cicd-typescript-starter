name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Force Failure
        run: (exit 0)

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: test coverage
        run: npm run test -- --coverage

  style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check out code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Style check
        run: npm run format:check

      - name: Lint check
        run: npm run lint
    