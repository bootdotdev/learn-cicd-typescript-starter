name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4.14.0 # pinned SHA for security
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4.11.0 # pinned SHA
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --coverage

  style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4.14.0 # pinned SHA
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4.11.0 # pinned SHA
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Check linting
        run: npm run lint -- --max-warnings=0
