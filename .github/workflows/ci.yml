name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # Changed from [18,20] to single version string

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm run test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 7

      - name: Upload HTML report
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: vitest-html-report
          path: coverage/html/
          retention-days: 7

      - name: Force Failure
        run: (exit 1)