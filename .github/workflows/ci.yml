name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Node Version and install dependencies
        run: node --version && npm ci

      - name: Style
        run: npm run format:check

      - name: run tests
        run: npm run test -- --coverage
