name: ci

on:
  
  pull_request:
    branches: [main, addtests]

jobs:
  
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name : Run test
        run: npm run test -- --coverage

  style: 
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: style-check
        run : npm run format:check 

      - name: run lint
        run : npm run lint -- --max-warnings=0
