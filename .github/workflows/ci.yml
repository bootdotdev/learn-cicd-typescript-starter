# this is a workflow
name: ci

# the workflow will trigger on a pull request on the main branch
on:
  pull_request:
    branches: [main]

# jobs to run when the workflow is triggered
jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --coverage

  style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check formatting issues
        run: npm run format:check

      - name: Check for linting issues
        run: npm run lint -- --max-warnings=0
