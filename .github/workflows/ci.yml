name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
    
      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --coverage
  style:
    name: Style
    runs-on: ubuntu-latest
    steps:
        - name: Check out code
          uses: actions/checkout@v4

        - name: Set up Node
          uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm
        
        - name: Install dependencies
          run: npm ci

        - name: Format check
          run: npm run format:check
        
        - name: Lint check
          run: npm run lint -- --max-warnings=0
  gcp:
    runs-on: ubuntu-latest
    steps:
    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v3'
    
    - name: 'Use gcloud CLI'
      run: 'gcloud info'

