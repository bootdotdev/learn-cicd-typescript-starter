name: ci


on:
  pull_request:
    branches: [addtests]

jobs:
  tests:
    name: Tests
    runs-on: unbuntu-latest
    


    steps:
      - name: Check out code 
        uses: actions/checkout@v4




      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node version: 18

      - name: Node version
        run: node --version
